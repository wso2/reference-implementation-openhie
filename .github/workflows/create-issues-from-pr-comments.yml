name: Create Issues from PR Review Comments

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to create issues from'
        required: true
        default: '1'
      title_prefix:
        description: 'Prefix to add to issue titles'
        required: true
        default: '[OpenHIE]'

permissions:
  issues: write

jobs:
  create-issues:
    runs-on: ubuntu-latest
    steps:
      - name: Create issues from PR review comments
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const prNumber = parseInt(context.payload.inputs.pr_number);
            const titlePrefix = context.payload.inputs.title_prefix;

            // Get all review comments from the PR
            const reviewComments = await github.paginate(
              github.rest.pulls.listReviewComments,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
                per_page: 100,
              }
            );

            console.log(`Found ${reviewComments.length} review comments in PR #${prNumber}`);

            // Get existing issues to avoid duplicates
            const existingIssues = await github.paginate(
              github.rest.issues.listForRepo,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: 'all',
                per_page: 100,
              }
            );
            const existingTitles = new Set(existingIssues.map(i => i.title));

            let created = 0;
            let skipped = 0;

            for (const comment of reviewComments) {
              const title = `${titlePrefix} ${comment.body}`;

              // Skip if issue already exists with this title
              if (existingTitles.has(title)) {
                console.log(`Skipping (already exists): ${title}`);
                skipped++;
                continue;
              }

              const lineRef = comment.line || comment.original_line;
              const body = [
                `This issue was created from a review comment in PR #${prNumber}.`,
                '',
                `**File:** \`${comment.path}\``,
                lineRef ? `**Line:** ${lineRef}` : '',
                `**Comment URL:** ${comment.html_url}`,
                '',
                '---',
                '',
                comment.body,
              ].filter(l => l !== null && l !== undefined).join('\n');

              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
              });

              existingTitles.add(title);
              console.log(`Created issue: ${title}`);
              created++;
            }

            console.log(`Done. Created: ${created}, Skipped (duplicates): ${skipped}`);
